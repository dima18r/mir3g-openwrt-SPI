name: Build OpenWrt for Xiaomi Mi Router 3G (NOR mod)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker image prune -a -f || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 -b openwrt-24.10 https://github.com/openwrt/openwrt.git openwrt
      
      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ hashFiles('config.seed') }}
          restore-keys: |
            openwrt-dl-

      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: openwrt/staging_dir/toolchain-mipsel_24kc_musl
          key: openwrt-toolchain-24.10-mipsel
          restore-keys: |
            openwrt-toolchain-24.10-mipsel
      
      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply custom device (DIY)
        run: |
          cd openwrt
          if [ -f ../diy.sh ]; then
            chmod +x ../diy.sh
            ../diy.sh
          fi

      - name: Upload DTS for inspection
        uses: actions/upload-artifact@v4
        with:
          name: dts-file
          path: openwrt/target/linux/ramips/dts/mt7621_xiaomi_mir3g-nor.dts

      - name: Load custom config
        run: |
          # 1. Принудительно делаем резервную копию вашего seed прямо в папку openwrt под другим именем
          cp config.seed openwrt/config.seed.bak
          
          cd openwrt
          
          # 2. Переименовываем его в рабочий .config перед запуском defconfig
          cp config.seed.bak .config
          
          # 3. Запускаем штатный defconfig
          make defconfig
          
          cp .config config.txt
          
          # 4. ХИТРОСТЬ: Если defconfig стёр или очистил файл, мы восстанавливаем его из бакапа!
          if [ ! -s .config ]; then
            echo "ВНИМАНИЕ: defconfig сбросил настройки! Заменяем на копию seed для анализа."
            cp config.seed.bak .config
          fi

      - name: Upload .config for inspection
        uses: actions/upload-artifact@v4
        with:
          name: dotconfig
          # Передаем жесткий абсолютный путь к файлу
          path: ${{ github.workspace }}/openwrt/config.txt

      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: openwrt/bin/targets/*/*/*.bin
