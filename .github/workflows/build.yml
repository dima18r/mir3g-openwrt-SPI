name: Build OpenWrt for Xiaomi Mi Router 3G (NOR mod)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker image prune -a -f || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 -b v25.12.5 https://github.com/openwrt/openwrt.git openwrt

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ hashFiles('config.seed') }}
          restore-keys: openwrt-dl-
          
      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply custom device (DIY)
        run: |
          cd openwrt
          chmod +x ../diy.sh
          ../diy.sh

      - name: Upload DTS for inspection
        uses: actions/upload-artifact@v4
        with:
          name: dts-file
          path: openwrt/target/linux/ramips/dts/mt7621_xiaomi_mir3g-nor.dts

      - name: Load custom config
        run: |
          cp config.seed openwrt/.config
          cd openwrt
          make defconfig
          echo "--- Проверка устройства ---"
          grep "mir3g-nor" .config || echo "ВНИМАНИЕ: устройство не найдено!"

      - name: Upload config for inspection
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config
          path: openwrt/.config

      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Show staging_dir contents
        run: |
          echo "--- staging_dir ---"
          ls openwrt/staging_dir/
          echo "--- toolchain folder name ---"
          ls openwrt/staging_dir/ | grep toolchain

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: openwrt/bin/targets/*/*/*.bin
