name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker image prune -a -f || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 -b openwrt-24.10 https://github.com/openwrt/openwrt.git openwrt

      - name: Cache OpenWrt Build
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir
          key: ${{ runner.os }}-openwrt-${{ hashFiles('openwrt/feeds.conf.default', 'openwrt/include/target.mk') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply custom device (DIY)
        run: |
          cd openwrt
          if [ -f ../diy.sh ]; then
            chmod +x ../diy.sh
            ../diy.sh
          fi

      - name: Upload DTS for inspection
        uses: actions/upload-artifact@v4
        with:
          name: dts-file
          path: openwrt/target/linux/ramips/dts/mt7621_xiaomi_mir3g-nor.dts

      - name: Load custom config
        run: |
          # 1. Принудительно копируем конфиг без условий 'if'
          cp config.seed openwrt/.config
          
          cd openwrt
          
          # 2. Жестко фиксируем архитектуру в конфиге, чтобы defconfig не прыгал на x86
          echo "CONFIG_TARGET_ramips=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          
          # 3. Запускаем генерацию конфигурации
          make defconfig
          
          # 4. Проверяем, выжил ли файл. Если он пустой, восстанавливаем копию для анализа!
          if [ ! -s .config ]; then
            echo "ВНИМАНИЕ: defconfig сбросил настройки! Копируем оригинал для анализа."
            cp ../config.seed .config
          fi
          
      - name: Upload .config for inspection
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config
          path: openwrt/.config
          
      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: openwrt/bin/targets/*/*/*.bin
