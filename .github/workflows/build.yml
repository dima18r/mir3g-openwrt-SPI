name: OpenWrt Build for Xiaomi Mi 3G SPI

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com
  REPO_BRANCH: openwrt-23.05

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo u-boot-tools upx-ucl unzip vim wget xmlto xz-utils zlib1g-dev python3-distutils
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Clone OpenWrt Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt

      - name: Cache OpenWrt Build
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.env.REPO_BRANCH }}-

      - name: Update and Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply Custom DIY Script
        run: |
          chmod +x diy.sh
          ./diy.sh

      - name: Load and Generate Config
        run: |
          cp config.seed openwrt/.config
          cd openwrt
          make defconfig
          cp .config config.txt

      - name: Upload Configuration File
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-config
          path: ${{ github.workspace }}/openwrt/config.txt

      - name: Build Firmware
        run: |
          cd openwrt
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: openwrt/bin/targets/ramips/mt7621/*sysupgrade.bin
